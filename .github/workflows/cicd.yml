name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: write

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: Run lint and format checks
        run: uv run poe format

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: Run unit tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: uv run poe test

  update-hooks:
    name: Update pre-commit hooks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'
          gh-token: ${{ secrets.GH_TOKEN }}
          checkout-ref: ${{ github.head_ref }}

      - name: Autoupdate pre-commit hooks
        run: uv run pre-commit autoupdate

      - name: Commit updated hooks
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .pre-commit-config.yaml
          git diff --staged --quiet || git commit -m "chore(config): update pre-commit hooks"
          git push origin HEAD:${{ github.head_ref }}

  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: Bump version and update changelog
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.1
        with:
          github_token: ${{ secrets.GH_TOKEN }}

    outputs:
      released: ${{ steps.release.outputs.released }}

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: needs.versioning.outputs.released == 'true'
    needs: [versioning]
    environment:
      name: pypi
      url: https://pypi.org/p/fauth
    steps:
      - name: Setup environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'
          gh-token: ${{ secrets.GH_TOKEN }}
          checkout-ref: main
          install-dependencies: 'false'

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
